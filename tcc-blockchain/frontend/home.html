<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Rastreabilidade Industrial</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="topbar">

    <h1>Sistema de Rastreabilidade Industrial</h1>

    <div class="statusBox">
      <span id="statusDot" class="dot yellow"></span>
      <span id="statusText">Não conectado</span>
    </div>

    <button id="connectBtn">Conectar MetaMask</button>

  </header>

  <main class="container">

    <section class="card">

      <h2>Registrar Manutenção</h2>

      <label>Máquina</label>
      <input type="text" id="maquina" placeholder="Ex: Motor-01">

      <label>Descrição da Manutenção</label>
      <textarea id="descricao" rows="4"></textarea>

      <label>Prioridade</label>
      <select id="prioridade">
        <option value="">Selecione</option>
        <option value="Baixa">Baixa</option>
        <option value="Média">Média</option>
        <option value="Alta">Alta</option>
      </select>

      <label>Operador</label>
      <input type="text" id="operador">

      <button id="registrarBtn">Registrar Manutenção</button>

      <p id="mensagemErro" class="erro"></p>

    </section>

    <section class="card">

      <h2>Manutenções Registradas</h2>

      <button id="listarBtn">Atualizar Lista</button>

      <div id="lista"></div>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.0/dist/ethers.umd.min.js"></script>
  <script src="app.js"></script>

</body>

</html>
